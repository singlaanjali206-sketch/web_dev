<!DOCTYPE html>
<html>
<head>
  <title>Algo Trading Bot</title>
</head>
<body>

  <h1>Algo Trading Bot</h1>
  <p>Click the button to run the bot for 10 rounds.</p>

  <button onclick="startBot()">Run Bot</button>
  <button onclick="clearLog()">Clear</button>

  <h2>Results:</h2>
  <div id="output"></div>

  <script>

    // --- Initial Setup ---
    var balance = 1000;
    var stockPrice = 100;
    var holdings = 0;

    // --- Function 1: Update Stock Price ---
    // Generates a random price between 80 and 120
    function updatePrice() {
      stockPrice = Math.floor(Math.random() * 41) + 80;
    }

    // --- Function 2: Decide Action ---
    // Returns "BUY", "SELL", or "HOLD" based on price
    function decideAction() {
      if (stockPrice < 90 && balance >= stockPrice) {
        return "BUY";
      } else if (stockPrice > 110 && holdings > 0) {
        return "SELL";
      } else {
        return "HOLD";
      }
    }

    // --- Function 3: Execute Trade ---
    // Performs the buy/sell/hold action
    function trade(action) {
      if (action === "BUY") {
        balance = balance - stockPrice;
        holdings = holdings + 1;
      } else if (action === "SELL") {
        balance = balance + stockPrice;
        holdings = holdings - 1;
      }
      // HOLD: do nothing
    }

    // --- Function 4: Print a Round to the Page ---
    function printRound(round, action) {
      var output = document.getElementById("output");

      var line = document.createElement("p");
      line.innerHTML =
        "<b>Round " + round + ":</b> " +
        "Stock Price = $" + stockPrice +
        " &rarr; Action = <b>" + action + "</b>" +
        " &rarr; Balance = $" + balance +
        " &rarr; Holdings = " + holdings + " share(s)";

      output.appendChild(line);
    }

    // --- Main Bot: Run for 10 Rounds ---
    function startBot() {

      // Reset everything
      balance = 1000;
      stockPrice = 100;
      holdings = 0;

      document.getElementById("output").innerHTML = "";

      // Loop 10 rounds
      for (var round = 1; round <= 10; round++) {

        // Step 1: Update the price
        updatePrice();

        // Step 2: Decide what to do
        var action = decideAction();

        // Step 3: Execute the trade
        trade(action);

        // Step 4: Print the result
        printRound(round, action);
      }

      // Show final summary
      var output = document.getElementById("output");
      var summary = document.createElement("p");
      summary.innerHTML =
        "<hr><b>Final Summary:</b> " +
        "Balance = $" + balance +
        " | Holdings = " + holdings + " share(s)" +
        " | Profit/Loss = $" + (balance - 1000);
      output.appendChild(summary);
    }

    // --- Clear the output ---
    function clearLog() {
      document.getElementById("output").innerHTML = "";
    }

  </script>

</body>
</html>
