<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JavaScript</title>
</head>
<body>
    <h1>Welcome to JavaScript</h1>
    <p id="demo">JavaScript is a versatile programming language used for web development, allowing developers to create interactive and dynamic web pages.</p>
    <p id="demo2">JavaScript can be used for both client-side and server-side development, making it a powerful tool for building modern web applications.</p>
    <button onclick="window.print()">Print this page</button>
    <script>
        console.log("Hello, JavaScript!");
        window.alert("Hello, JavaScript!");
        document.write("Hello, JavaScript!");
        document.getElementById("demo").innerHTML="<h1>OUTPUT METHODS!</h1>"; 
        document.getElementById("demo2").innerText="<h1>OUTPUT METHODS IN JAVASCRIPT!</h1>";
    </script>
</body>
</html>
