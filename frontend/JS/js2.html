<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JavaScript variables</title>
</head>
<body>
    <h1>JavaScript Variables</h1>
    <p id="demo">Variables are used to store data in JavaScript. They can hold different types of data, such as numbers, strings, and objects.</p>
    <script>
        var name = "Anjali Singla";
        let age = 30;
        const PI = 3.14;

        console.log("Name: " + name);
        console.log("Age: " + age);
        console.log("PI: " + PI);

        document.getElementById("demo").innerHTML="<h1>Variables in JavaScript!</h1>";
    </script>
</body>
</html>
